name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main


jobs:

  docker-push:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build API image
        run: |
          docker build \
          -f Dockerfile.api \
          -t ${{ secrets.DOCKER_USERNAME }}/investment-research-api:latest .


      - name: Push API image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/investment-research-api:latest


      - name: Build frontend image
        run: |
          docker build \
          -f Dockerfile.frontend \
          -t ${{ secrets.DOCKER_USERNAME }}/investment-research-frontend:latest .


      - name: Push frontend image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/investment-research-frontend:latest