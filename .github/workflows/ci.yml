name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run tests
        env:
          GROQ_API_KEY: dummy-key-for-tests
          TAVILY_API_KEY: dummy-key-for-tests
        run: pytest tests/ -v



  docker-build:

    needs: test
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Build API image
        run: docker build -f Dockerfile.api -t investment-research-api .


      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t investment-research-frontend .
